name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/sunface/rust-course.git

      - name: Fetch and check updates
        id: check
        run: |
          git fetch upstream main
          if git merge-base --is-ancestor upstream/main main; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ No updates available"
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "🔄 Updates found"
          fi

      - name: Merge and push
        if: steps.check.outputs.has_updates == 'true'
        run: |
          if git merge upstream/main --allow-unrelated-histories -X theirs; then
            git push origin main
            echo "✅ Successfully merged and pushed"
          else
            echo "❌ Merge failed, please check manually"
            exit 1
          fi

      - name: Show latest commit
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "📦 Latest upstream commit:"
          git log -1 --oneline

      - name: Trigger Netlify build
        if: steps.check.outputs.has_updates == 'true'
        run: |
          curl -X POST -d '{}' "https://api.netlify.com/build_hooks/${NETLIFY_HOOK_ID}"
        env:
          NETLIFY_HOOK_ID: ${{ secrets.NETLIFY_BUILD_HOOK }}
